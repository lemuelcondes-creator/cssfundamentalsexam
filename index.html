        const questionBank = rawQuestionData.trim().split('\n').map(line => {
            const p = line.split('|');
            return { questionText: p[0], options: [p[1], p[2], p[3], p[4]], correctOptionIndex: parseInt(p[5], 10) };
        });

        // Helper to format name as "Last, First M."
        function getFormattedName(profile) {
            let initial = "";
            if (profile.middleName && profile.middleName.trim() !== "") {
                initial = " " + profile.middleName.trim().charAt(0).toUpperCase() + ".";
            }
            let first = profile.firstName ? profile.firstName.trim() : "";
            let last = profile.lastName ? profile.lastName.trim() : "";
            return `${last}, ${first}${initial}`.toUpperCase();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- Persistent State & Autosave ---
        function saveState() {
            if(examState.submitted) return;

            examState.profile.lastName = document.getElementById('lastName').value;
            examState.profile.firstName = document.getElementById('firstName').value;
            examState.profile.middleName = document.getElementById('middleName').value;
            examState.profile.trainerName = document.getElementById('trainerName').value;
            
            const sexEl = document.querySelector('input[name="sex"]:checked');
            examState.profile.sex = sexEl ? sexEl.value : "";
            
            const secEl = document.querySelector('input[name="section"]:checked');
            examState.profile.section = secEl ? secEl.value : "";

            localStorage.setItem(STORAGE_KEY, JSON.stringify(examState));
        }

        function restoreUIFromState() {
            document.getElementById('lastName').value = examState.profile.lastName || '';
            document.getElementById('firstName').value = examState.profile.firstName || '';
            document.getElementById('middleName').value = examState.profile.middleName || '';
            document.getElementById('trainerName').value = examState.profile.trainerName || '';

            if (examState.profile.sex) {
                const sexEl = document.querySelector(`input[name="sex"][value="${examState.profile.sex}"]`);
                if(sexEl) sexEl.checked = true;
            }
            if (examState.profile.section) {
                const secEl = document.querySelector(`input[name="section"][value="${examState.profile.section}"]`);
                if(secEl) secEl.checked = true;
            }

            const qc = document.getElementById('questions-container');
            qc.innerHTML = '';
            
            examState.quiz.forEach((q, index) => {
                const questionNumber = index + 2; 
                let optionsHTML = '';
                q.options.forEach((opt) => {
                    const isChecked = (q.userAnswer === opt) ? 'checked' : '';
                    optionsHTML += `
                        <label class="option-label">
                            <input type="radio" name="q${index}" value="${opt.replace(/"/g, '&quot;')}" ${isChecked}>
                            ${opt}
                        </label>
                    `;
                });

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="question-text">${questionNumber}. ${q.question} <span style="font-weight:normal; color:#666;">(1 Point)</span></div>
                    <div class="options-group">${optionsHTML}</div>
                `;
                qc.appendChild(card);
            });
        }

        // --- Timer Logic ---
        function startTimer() {
            document.getElementById('timer-container').classList.remove('hidden');
            
            timerInterval = setInterval(() => {
                const now = Date.now();
                const timeLeft = Math.max(0, examState.endTime - now);
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer-container').innerText = "00:00";
                    alert("Time is up! Your exam is being submitted automatically.");
                    submitExam(true);
                } else {
                    const minutes = Math.floor(timeLeft / 60000);
                    const seconds = Math.floor((timeLeft % 60000) / 1000);
                    
                    const display = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    const timerEl = document.getElementById('timer-container');
                    timerEl.innerText = display;

                    if (timeLeft < 60000) {
                        timerEl.classList.add('timer-warning');
                    }
                }
            }, 1000);
        }

        // --- Initialization ---
        function initExam(forceNew = false) {
            clearInterval(timerInterval);
            
            if (!forceNew) {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        examState = JSON.parse(saved);
                    }
                } catch (e) {
                    console.error("Failed to parse saved state.");
                }
            }

            if (examState.submitted || (examState.endTime && Date.now() >= examState.endTime && examState.quiz.length > 0)) {
                submitExam(true); 
                return;
            }

            if (examState.quiz.length === 0 || forceNew) {
                // Exactly 50 questions
                let selectedQuestions = shuffle([...questionBank]).slice(0, 50);
                examState.quiz = selectedQuestions.map(item => ({
                    question: item.questionText,
                    options: shuffle([...item.options]),
                    correctAnswer: item.options[item.correctOptionIndex],
                    userAnswer: null
                }));
                examState.endTime = Date.now() + EXAM_DURATION_MS;
                examState.submitted = false;
                examState.accomplishedTime = null;
                saveState();
            }

            document.getElementById('profile-container').addEventListener('input', saveState);
            document.getElementById('profile-container').addEventListener('change', saveState);
            document.getElementById('trainerName').addEventListener('input', saveState);
            
            document.getElementById('questions-container').addEventListener('change', (e) => {
                if (e.target.type === 'radio' && e.target.name.startsWith('q')) {
                    const idx = parseInt(e.target.name.substring(1));
                    examState.quiz[idx].userAnswer = e.target.value;
                    saveState();
                }
            });

            restoreUIFromState();
            document.getElementById('timer-container').classList.remove('timer-warning');
            startTimer();
        }

        // --- Submission & Review ---
        function submitExam(isAutoSubmit = false) {
            saveState();

            if (!isAutoSubmit) {
                if(!examState.profile.lastName || !examState.profile.firstName || !examState.profile.sex || !examState.profile.section) {
                    alert("Please complete the Examinee Profile section before submitting.");
                    return;
                }

                let missedQuestionsWarning = examState.quiz.some(q => q.userAnswer === null);
                if(missedQuestionsWarning) {
                    const confirmSubmit = confirm("You have unanswered questions. Are you sure you want to submit?");
                    if(!confirmSubmit) return;
                }
            }

            clearInterval(timerInterval);
            document.getElementById('timer-container').classList.add('hidden');

            // Grade Exam
            examState.score = 0;
            
            // Question 1 Scoring (5 Points)
            const trainerInput = (examState.profile.trainerName || "").trim().toUpperCase();
            if (trainerInput === CORRECT_TRAINER_NAME) {
                examState.score += 5;
            }

            // Random Questions Scoring (1 Point each)
            examState.quiz.forEach(q => {
                if(q.userAnswer === q.correctAnswer) {
                    examState.score += 1;
                }
            });

            // Set Timestamp
            if (!examState.accomplishedTime) {
                examState.accomplishedTime = Date.now();
            }

            examState.submitted = true;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(examState));
            generateReviewPage();
        }

        function generateReviewPage() {
            document.getElementById('quiz-page').classList.add('hidden');
            document.getElementById('review-page').classList.remove('hidden');
            
            document.getElementById('score-display').innerText = `Total Score: ${examState.score} / ${MAX_SCORE}`;
            
            // Generate Summary Page Card
            const summaryContainer = document.getElementById('summary-container');
            const fullName = getFormattedName(examState.profile);
            const sex = examState.profile.sex || "N/A";
            const section = examState.profile.section || "N/A";
            
            // Format Timestamp
            const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            const timestampStr = new Date(examState.accomplishedTime).toLocaleString(undefined, options);

            const summaryHTML = `
                <div class="card summary-wrapper">
                    <div class="summary-info">
                        <div class="card-title" style="margin-bottom: 5px;">Result Summary</div>
                        <p><strong>Examinee:</strong> ${fullName}</p>
                        <p><strong>Sex:</strong> ${sex}</p>
                        <p><strong>Section:</strong> ${section}</p>
                        <p><strong>Score:</strong> <span style="color:var(--correct-text); font-weight:bold; font-size: 1.2rem;">${examState.score} / ${MAX_SCORE} Points</span></p>
                        <p><strong>Date Completed:</strong> ${timestampStr}</p>
                    </div>
                    <div class="summary-qr" id="qrcode"></div>
                </div>
            `;
            summaryContainer.innerHTML = summaryHTML;

            // Generate QR Code containing info
            const qrPayload = `Name: ${fullName}\nSex: ${sex}\nSection: ${section}\nScore: ${examState.score}/${MAX_SCORE}\nDate: ${timestampStr}`;
            new QRCode(document.getElementById("qrcode"), {
                text: qrPayload,
                width: 128,
                height: 128,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.L
            });

            // Generate Details Review
            const reviewContainer = document.getElementById('review-container');
            let reviewHTML = '';

            const trainerInput = (examState.profile.trainerName || "").trim().toUpperCase();
            const isTrainerCorrect = (trainerInput === CORRECT_TRAINER_NAME);
            
            reviewHTML += `
                <div class="card">
                    <div class="question-text">1. What is the name of your CSS Trainer/Teacher? <span style="font-weight:normal; color:#666;">(5 Points)</span></div>
                    <div class="review-opt ${isTrainerCorrect ? 'opt-correct' : 'opt-wrong'}">
                        Your Answer: ${trainerInput || '[No Answer Provided]'} ${isTrainerCorrect ? '<span class="badge">Correct (+5) ✓</span>' : '<span class="badge">Mistake (0) ✗</span>'}
                    </div>
                    ${!isTrainerCorrect ? `<div class="review-opt opt-missed">Correct Answer: ${CORRECT_TRAINER_NAME}</div>` : ''}
                </div>
            `;

            examState.quiz.forEach((q, index) => {
                const questionNumber = index + 2;
                let optionsListHTML = '';

                q.options.forEach(opt => {
                    let cssClass = 'review-opt';
                    let badge = '';

                    if (opt === q.correctAnswer && opt === q.userAnswer) {
                        cssClass += ' opt-correct';
                        badge = '<span class="badge">Your Correct Answer (+1) ✓</span>';
                    } else if (opt === q.userAnswer && opt !== q.correctAnswer) {
                        cssClass += ' opt-wrong';
                        badge = '<span class="badge">Your Mistake (0) ✗</span>';
                    } else if (opt === q.correctAnswer && opt !== q.userAnswer) {
                        cssClass += ' opt-missed';
                        badge = '<span class="badge">Correct Answer ✓</span>';
                    }

                    optionsListHTML += `<div class="${cssClass}">${opt} ${badge}</div>`;
                });

                reviewHTML += `
                    <div class="card">
                        <div class="question-text">${questionNumber}. ${q.question} <span style="font-weight:normal; color:#666;">(1 Point)</span></div>
                        ${optionsListHTML}
                    </div>
                `;
            });

            reviewContainer.innerHTML = reviewHTML;
            window.scrollTo(0, 0);
        }

        function retakeExam() {
            const currentProfile = { ...examState.profile };
            examState = {
                endTime: null,
                submitted: false,
                score: 0,
                accomplishedTime: null,
                profile: currentProfile,
                quiz: []
            };
            
            document.getElementById('review-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            
            initExam(true);
            window.scrollTo(0, 0);
        }

        // Start App
        window.onload = () => initExam(false);

    </script>
