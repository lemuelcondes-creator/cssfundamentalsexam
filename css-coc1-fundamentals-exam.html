<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS COC 1 Fundamentals: Comprehensive Assessment</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --accent: #60a5fa;
            --bg: #f0f9ff;
            --surface: #ffffff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --success: #10b981;
            --danger: #ef4444;
            --border: #e5e7eb;
            --radius: 8px;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main); line-height: 1.6; }
        
        header {
            background-color: var(--primary); color: white; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .header-title { font-size: 1.25rem; font-weight: bold; }
        .timer-score-container { font-size: 1.25rem; font-weight: bold; background: rgba(255,255,255,0.2); padding: 0.5rem 1rem; border-radius: var(--radius); }
        
        main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .page { display: none; background: var(--surface); padding: 2.5rem; border-radius: var(--radius); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .page.active { display: block; animation: fadeIn 0.4s ease-in-out; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1, h2, h3 { color: var(--primary); margin-top: 0; }
        hr { border: 0; border-top: 1px solid var(--border); margin: 2rem 0; }

        /* Form Elements */
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-muted); }
        input[type="text"], select {
            width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px;
            font-size: 1rem; transition: border-color 0.2s;
        }
        input[type="text"]:focus, select:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        input.uppercase-input { text-transform: uppercase; }

        /* Questions */
        .question-card { background: #f8fafc; padding: 1.5rem; border-radius: var(--radius); margin-bottom: 1.5rem; border: 1px solid var(--border); }
        .question-text { font-weight: 600; margin-bottom: 1rem; font-size: 1.1rem; }
        .points-badge { display: inline-block; background: var(--secondary); color: white; font-size: 0.8rem; padding: 0.2rem 0.5rem; border-radius: 4px; margin-left: 0.5rem; vertical-align: middle; }
        
        .options-grid { display: grid; gap: 0.75rem; }
        .option-label {
            display: flex; align-items: center; padding: 0.75rem 1rem; background: var(--surface);
            border: 1px solid var(--border); border-radius: 4px; cursor: pointer; transition: all 0.2s;
        }
        .option-label:hover { background: #eff6ff; border-color: var(--accent); }
        .option-label input { margin-right: 1rem; cursor: pointer; width: 1.2rem; height: 1.2rem; accent-color: var(--primary); }

        .image-display {
            width: 100%; max-width: 400px; height: auto; max-height: 250px; object-fit: contain;
            margin-bottom: 1rem; border-radius: 4px; border: 1px solid var(--border); display: block;
        }
        .image-placeholder {
            width: 100%; max-width: 400px; height: 250px; background: #e2e8f0; display: flex;
            align-items: center; justify-content: center; margin-bottom: 1rem; border-radius: 4px;
            color: #64748b; font-weight: bold; border: 2px dashed #cbd5e1;
        }

        /* Navigation */
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
        button {
            padding: 0.75rem 1.5rem; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold;
            cursor: pointer; transition: background-color 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: #172554; }
        .btn-secondary { background-color: #e5e7eb; color: var(--text-main); }
        .btn-secondary:hover { background-color: #d1d5db; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-success:hover { background-color: #059669; }

        /* Results & Review */
        .results-header { text-align: center; margin-bottom: 2rem; }
        .score-display { font-size: 5rem; font-weight: bold; color: var(--primary); line-height: 1; margin: 1rem 0; }
        .status-pass { color: var(--success); font-size: 2rem; font-weight: bold; }
        .status-fail { color: var(--danger); font-size: 2rem; font-weight: bold; }
        .student-info-card { background: #f8fafc; padding: 1.5rem; border-radius: var(--radius); margin-bottom: 2rem; text-align: left; border-left: 5px solid var(--primary); }
        
        .review-correct { border-left: 4px solid var(--success) !important; background: #ecfdf5 !important; }
        .review-incorrect { border-left: 4px solid var(--danger) !important; background: #fef2f2 !important; }
        .correct-answer-text { color: var(--success); font-weight: bold; margin-top: 0.5rem; font-size: 0.9rem; }
        .user-answer-text { font-style: italic; color: var(--text-muted); }
    </style>
</head>

        answers: { mc: [], tf: [], ident: [], image: [] },
        shuffledData: { mc: [], tf: [], ident: [], image: [] },
        currentPage: 0, // 0 is prep, 1=mc, 2=tf, 3=id, 4=img, 5=result, 6-9=review
        isReviewMode: false
    };

    // --- UTILITIES ---
    function shuffleArray(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function buildShuffledExam() {
        // Shuffle MC and their options
        examState.shuffledData.mc = shuffleArray(rawData.mc).map(q => {
            return { ...q, shuffledOptions: shuffleArray(q.options) };
        });
        
        // Shuffle TF
        examState.shuffledData.tf = shuffleArray(rawData.tf);
        
        // Shuffle Ident and PREPEND the fixed question
        let shuffledIdent = shuffleArray(rawData.ident).map(q => ({...q, points: 1}));
        examState.shuffledData.ident = [{ ...fixedIdentQuestion }, ...shuffledIdent];
        
        // Shuffle Images
        examState.shuffledData.image = shuffleArray(rawData.image);
    }

    // --- DOM GENERATION ---
    function generateExamHTML() {
        const container = document.getElementById('quiz-pages-container');
        let html = '';

        // Page 2: MC
        html += `<div id="page-2" class="page">
            <h2>Test 1: Multiple-Choice (30 items)</h2>
            <p>Directions: Read each question carefully and select the best answer.</p><hr>`;
        examState.shuffledData.mc.forEach((q, i) => {
            html += `<div class="question-card" id="mc-card-${i}">
                <div class="question-text">${i + 1}. ${q.q}</div>
                <div class="options-grid">`;
            q.shuffledOptions.forEach((opt, j) => {
                html += `<label class="option-label">
                    <input type="radio" name="mc-${i}" value="${opt.replace(/"/g, '&quot;')}">
                    ${opt}
                </label>`;
            });
            html += `</div><div class="review-feedback" id="mc-feed-${i}"></div></div>`;
        });
        html += `<div class="nav-buttons">
            <button class="btn-secondary nav-btn" onclick="navTo(1)" id="mc-prev" style="display:none;">Previous</button>
            <button class="btn-primary nav-btn" onclick="navTo(3)" id="mc-next">Next Part</button>
        </div></div>`;

        // Page 3: TF
        html += `<div id="page-3" class="page">
            <h2>Test 2: True or False (20 items)</h2>
            <p>Directions: Select True if the statement is correct, or False if incorrect.</p><hr>`;
        examState.shuffledData.tf.forEach((q, i) => {
            html += `<div class="question-card" id="tf-card-${i}">
                <div class="question-text">${i + 1}. ${q.q}</div>
                <div class="options-grid" style="grid-template-columns: 1fr 1fr;">
                    <label class="option-label"><input type="radio" name="tf-${i}" value="True"> True</label>
                    <label class="option-label"><input type="radio" name="tf-${i}" value="False"> False</label>
                </div><div class="review-feedback" id="tf-feed-${i}"></div></div>`;
        });
        html += `<div class="nav-buttons">
            <button class="btn-secondary nav-btn" onclick="navTo(2)" id="tf-prev">Previous</button>
            <button class="btn-primary nav-btn" onclick="navTo(4)" id="tf-next">Next Part</button>
        </div></div>`;

        // Page 4: Identification
        html += `<div id="page-4" class="page">
            <h2>Test 3: Identification / Fill-in-the-Blank (16 items)</h2>
            <p>Directions: Identify the exact term. <b>Answers must be in ALL CAPS.</b></p><hr>`;
        examState.shuffledData.ident.forEach((q, i) => {
            let ptBadge = q.points === 5 ? `<span class="points-badge">5 Points</span>` : '';
            html += `<div class="question-card" id="id-card-${i}">
                <div class="question-text">${i + 1}. ${q.q} ${ptBadge}</div>
                <input type="text" class="uppercase-input" name="id-${i}" autocomplete="off">
                <div class="review-feedback" id="id-feed-${i}"></div>
            </div>`;
        });
        html += `<div class="nav-buttons">
            <button class="btn-secondary nav-btn" onclick="navTo(3)" id="id-prev">Previous</button>
            <button class="btn-primary nav-btn" onclick="navTo(5)" id="id-next">Next Part</button>
        </div></div>`;

        // Page 5: Image Identification
        html += `<div id="page-5" class="page">
            <h2>Test 4: Image Identification (15 items)</h2>
            <p>Directions: Identify the component shown.</p><hr>`;
        examState.shuffledData.image.forEach((q, i) => {
            // Checks if user pasted a link, otherwise fallback to placeholder generator.
            let displayUrl = (q.imgUrl === "PASTE_YOUR_LINK_HERE" || q.imgUrl.trim() === "") 
                ? `https://via.placeholder.com/400x250?text=${encodeURIComponent(q.imgName)}` 
                : q.imgUrl;

            html += `<div class="question-card" id="img-card-${i}">
                <div class="question-text">${i + 1}. Identify this component:</div>
                <img src="${displayUrl}" alt="Component Image" class="image-display" 
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="image-placeholder" style="display:none;">[IMAGE FAILED TO LOAD: ${q.imgName}]</div>
                <input type="text" class="uppercase-input" name="img-${i}" autocomplete="off" placeholder="YOUR ANSWER HERE">
                <div class="review-feedback" id="img-feed-${i}"></div>
            </div>`;
        });
        html += `<div class="nav-buttons">
            <button class="btn-secondary nav-btn" onclick="navTo(4)" id="img-prev">Previous</button>
            <button class="btn-success nav-btn" onclick="confirmSubmit()" id="img-next">Submit Examination</button>
        </div></div>`;

        // Page 6: Results
        html += `<div id="page-6" class="page">
            <div class="results-header">
                <h2>Examination Results</h2>
                <div id="result-status"></div>
                <div class="score-display" id="final-score">0 / 85</div>
                <p id="result-message"></p>
            </div>
            <div class="student-info-card" id="student-summary"></div>
            <div class="nav-buttons" style="justify-content: center; gap: 1rem;">
                <button class="btn-primary" onclick="startReview()">Review Answers</button>
                <button class="btn-secondary" onclick="location.reload()">Retake Quiz</button>
            </div>
        </div>`;

        container.innerHTML = html;
        
        // Auto-uppercase listener for text inputs
        document.querySelectorAll('.uppercase-input').forEach(input => {
            input.addEventListener('input', function() {
                this.value = this.value.toUpperCase();
            });
        });
    }

    // --- LOGIC ---
    function startExam() {
        const ln = document.getElementById('lastName').value.trim();
        const fn = document.getElementById('firstName').value.trim();
        const sec = document.getElementById('section').value;

        if (!ln || !fn || !sec) {
            alert('Please fill out your Last Name, First Name, and Section to begin.');
            return;
        }

        examState.student = {
            lastName: ln,
            firstName: fn,
            middleName: document.getElementById('middleName').value.trim(),
            section: sec,
            timestamp: new Date().toLocaleString()
        };

        buildShuffledExam();
        generateExamHTML();
        navTo(2); // Go to MC
        
        // Start Timer
        startTimer();
    }

    function navTo(pageIndex) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`page-${pageIndex}`).classList.add('active');
        examState.currentPage = pageIndex;
        window.scrollTo(0, 0);

        if(examState.isReviewMode) {
            setupReviewModeNavigation(pageIndex);
        }
    }

    function startTimer() {
        const timerDisplay = document.getElementById('global-timer');
        examState.timerInterval = setInterval(() => {
            examState.timeLimitSec--;
            let m = Math.floor(examState.timeLimitSec / 60);
            let s = examState.timeLimitSec % 60;
            timerDisplay.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

            if (examState.timeLimitSec <= 0) {
                clearInterval(examState.timerInterval);
                alert("Time is up! Your examination will be automatically submitted.");
                processSubmission();
            }
        }, 1000);
    }

    function confirmSubmit() {
        if(confirm("Are you sure you want to submit your examination? You cannot change your answers after submitting.")) {
            processSubmission();
        }
    }

    function processSubmission() {
        clearInterval(examState.timerInterval);
        
        let score = 0;
        const totalPoints = 85; // 30 + 20 + (1x15 + 5) + 15

        // Save Answers & Grade MC (1pt each)
        examState.shuffledData.mc.forEach((q, i) => {
            const selected = document.querySelector(`input[name="mc-${i}"]:checked`);
            const ans = selected ? selected.value : "";
            examState.answers.mc.push(ans);
            if (ans === q.a) score += 1;
        });

        // Grade TF (1pt each)
        examState.shuffledData.tf.forEach((q, i) => {
            const selected = document.querySelector(`input[name="tf-${i}"]:checked`);
            const ans = selected ? selected.value : "";
            examState.answers.tf.push(ans);
            if (ans === q.a) score += 1;
        });

        // Grade Ident
        examState.shuffledData.ident.forEach((q, i) => {
            const val = document.querySelector(`input[name="id-${i}"]`).value.trim().toUpperCase();
            examState.answers.ident.push(val);
            if (q.a.includes(val)) score += q.points;
        });

        // Grade Image (1pt each)
        examState.shuffledData.image.forEach((q, i) => {
            const val = document.querySelector(`input[name="img-${i}"]`).value.trim().toUpperCase();
            examState.answers.image.push(val);
            if (q.a.includes(val)) score += 1;
        });

        showResults(score, totalPoints);
    }

    function showResults(score, total) {
        navTo(6);
        document.getElementById('global-timer').innerHTML = `Score: ${score}/${total}`;
        document.getElementById('final-score').textContent = `${score} / ${total}`;
        
        const passed = score >= 68;
        const statusEl = document.getElementById('result-status');
        const msgEl = document.getElementById('result-message');
        
        if (passed) {
            statusEl.innerHTML = `<span class="status-pass">PASSED</span>`;
            msgEl.textContent = "Congratulations! You have successfully passed the CSS COC 1 Fundamentals Assessment.";
        } else {
            statusEl.innerHTML = `<span class="status-fail">FAILED</span>`;
            msgEl.textContent = "Do not be discouraged. Review your materials, focus on the incorrect items, and try again.";
        }

        let fullName = `${examState.student.lastName}, ${examState.student.firstName} ${examState.student.middleName}`.trim();
        document.getElementById('student-summary').innerHTML = `
            <strong>Examinee:</strong> ${fullName}<br>
            <strong>Section:</strong> ${examState.student.section}<br>
            <strong>Date/Time Submitted:</strong> ${examState.student.timestamp}
        `;
    }

    function startReview() {
        examState.isReviewMode = true;
        
        // Disable all inputs
        document.querySelectorAll('input').forEach(inp => inp.disabled = true);

        // Apply visual feedback MC
        examState.shuffledData.mc.forEach((q, i) => {
            const userAns = examState.answers.mc[i];
            const isCorrect = userAns === q.a;
            const card = document.getElementById(`mc-card-${i}`);
            card.classList.add(isCorrect ? 'review-correct' : 'review-incorrect');
            
            let feedHTML = `<div class="user-answer-text">Your Answer: ${userAns || 'No Answer'}</div>`;
            if (!isCorrect) feedHTML += `<div class="correct-answer-text">Correct Answer: ${q.a}</div>`;
            document.getElementById(`mc-feed-${i}`).innerHTML = feedHTML;
        });

        // Apply visual feedback TF
        examState.shuffledData.tf.forEach((q, i) => {
            const userAns = examState.answers.tf[i];
            const isCorrect = userAns === q.a;
            const card = document.getElementById(`tf-card-${i}`);
            card.classList.add(isCorrect ? 'review-correct' : 'review-incorrect');
            
            let feedHTML = `<div class="user-answer-text">Your Answer: ${userAns || 'No Answer'}</div>`;
            if (!isCorrect) feedHTML += `<div class="correct-answer-text">Correct Answer: ${q.a}</div>`;
            document.getElementById(`tf-feed-${i}`).innerHTML = feedHTML;
        });

        // Apply visual feedback Ident
        examState.shuffledData.ident.forEach((q, i) => {
            const userAns = examState.answers.ident[i];
            const isCorrect = q.a.includes(userAns);
            const card = document.getElementById(`id-card-${i}`);
            card.classList.add(isCorrect ? 'review-correct' : 'review-incorrect');
            
            if (!isCorrect) {
                document.getElementById(`id-feed-${i}`).innerHTML = `<div class="correct-answer-text">Accepted Answer(s): ${q.a.join(' / ')}</div>`;
            }
        });

        // Apply visual feedback Image
        examState.shuffledData.image.forEach((q, i) => {
            const userAns = examState.answers.image[i];
            const isCorrect = q.a.includes(userAns);
            const card = document.getElementById(`img-card-${i}`);
            card.classList.add(isCorrect ? 'review-correct' : 'review-incorrect');
            
            if (!isCorrect) {
                document.getElementById(`img-feed-${i}`).innerHTML = `<div class="correct-answer-text">Accepted Answer(s): ${q.a.join(' / ')}</div>`;
            }
        });

        navTo(2); // Jump back to page 2 (MC) to start reviewing
    }

    function setupReviewModeNavigation(pageIndex) {
        // Adjust navigation buttons for review mode
        document.querySelectorAll('.nav-btn').forEach(btn => {
            if (btn.textContent.includes('Submit Examination')) {
                btn.textContent = "Finish Review";
                btn.classList.remove('btn-success');
                btn.classList.add('btn-primary');
                btn.onclick = () => navTo(6);
            }
            if (btn.id === "mc-prev") {
                btn.style.display = "block";
                btn.textContent = "Back to Results";
                btn.onclick = () => navTo(6);
            }
        });
    }
</script>
